services:
  - type: web
    name: aisummarizer
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATA_DIR
        value: "/data"
      - key: INTERNAL_JOB_SECRET
        generateValue: true
      - key: GEMINI_API_KEYS
        sync: false
      - key: OPENROUTER_API_KEYS
        sync: false
      - key: GROK_API_KEYS
        sync: false
    disk:
      name: aisummarizer-data
      mountPath: /data
      sizeGB: 10
